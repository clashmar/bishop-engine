[package]
name = "bishop"
version = "0.1.0"
edition = "2021"

[features]
default = ["macroquad"]
macroquad = ["dep:macroquad"]
wgpu = ["dep:wgpu", "dep:winit", "dep:pollster"]

[dependencies]
macroquad = { version = "0.4.14", optional = true }
wgpu = { version = "24.0", optional = true }
winit = { version = "0.30", optional = true }
pollster = { version = "0.4", optional = true }
glam = "0.32.0"
